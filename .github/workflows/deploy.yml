name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create config file with API key
        run: |
          # Vytvoríme priečinok scripts ak neexistuje
          mkdir -p scripts
          
          # Vygenerujeme config.js s API kľúčom z Secrets
          echo "// Tento súbor je automaticky generovaný pri nasadení" > scripts/config.js
          echo "window.APP_CONFIG = {" >> scripts/config.js
          echo "  GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'" >> scripts/config.js
          echo "};" >> scripts/config.js
          
          # DEBUG: Vypíšeme obsah priečinka
          echo "📁 Obsah priečinka scripts:"
          ls -la scripts/
          
          echo "✅ config.js vytvorený"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          keep_files: false
          
      - name: Notify completion
        run: echo "✅ Deployment completed successfully"
